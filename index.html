<!DOCTYPE html>
<html>
<head>
<title>Kartik Saravanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
  --bg: #e9e4db;
  --card-bg: rgba(255, 255, 255, 0.35);
  --text-primary: #2f2a24;
  --text-secondary: #6f665c;
  --button-bg: rgba(255, 255, 255, 0.45);
  --button-hover: rgba(255, 255, 255, 0.65);
  --border: rgba(255, 255, 255, 0.4);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: url('background_image.jpg') center/cover no-repeat;
  color: var(--text-primary);

  display: flex;
  align-items: center;
  justify-content: center;

  min-height: 100vh;
  padding: 20px;
}

.card {
  background: var(--card-bg);
  padding: 32px;
  border-radius: 18px;
  width: 100%;
  max-width: 420px;

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin-bottom: 4px;
  font-size: clamp(26px, 4vw, 32px);
  letter-spacing: 0.3px;
}

.pronouns {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 16px;
}

.subtitle {
  margin-bottom: 22px;
  color: var(--text-secondary);
  font-size: clamp(14px, 2.5vw, 16px);
  line-height: 1.5;
}

.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  gap: 10px;
  justify-content: flex-start;
  padding-left: 16px;

  background: var(--button-bg);
  color: var(--text-primary);
  text-decoration: none;

  border-radius: 10px;
  font-weight: 500;
  font-size: 15px;

  border: 1px solid var(--border);

  transition: all 0.2s ease;
}

.button:hover {
  background: var(--button-hover);
  transform: translateY(-1px);
}

.button img {
  width: 18px;
  height: 18px;
  object-fit: contain;
  opacity: 0.85;
}

@media (max-width: 480px) {

  .card {
    padding: 26px;
  }

  .button {
    padding: 16px;
    font-size: 16px;
  }

}

</style>
</head>

<body>

<div class="card">

<h1>Kartik Saravanan</h1>

<div class="pronouns">
he / him
</div>

<div class="subtitle">
Strategic Operations Fellow<br>
AIC RAISE
</div>

</div>

</body>
</html>
