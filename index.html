<!DOCTYPE html>
<html>
<head>
<title>Kartik Saravanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: #121212;
color: #e4e4e4;

display: flex;
align-items: center;
justify-content: center;

min-height: 100vh;
padding: 20px;
}

.card {
background: #1e1e1e;
padding: 32px;
border-radius: 14px;
width: 100%;
max-width: 420px;

box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

h1 {

}

}

.button {
display: block;
width: 100%;

margin: 10px 0;
padding: 14px;

background: #2c2c2c;
color: #ffffff;

text-decoration: none;
border-radius: 8px;

font-weight: 500;
font-size: 16px;

transition: background 0.2s ease;
}

.button:hover {
background: #3a3a3a;
}

@media (max-width: 480px) {

.card {
padding: 26px;
}

.button {
padding: 16px;
font-size: 17px;
}

}

</style>
</head>

<body>

<div class="card">

<h1>Kartik Saravanan</h1>

<div class="subtitle">
Strategic Operations Fellow<br>
AIC RAISE
