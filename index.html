<!DOCTYPE html>
<html>
<head>
<title>Kartik Saravanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
  --card-bg: rgba(30, 40, 45, 0.45);
  --text-primary: #e6e6e6;
  --text-secondary: #b0bec5;
  --button-bg: rgba(255, 255, 255, 0.08);
  --button-hover: rgba(255, 255, 255, 0.18);
  --border: rgba(255, 255, 255, 0.15);
}

* {
  box-sizing: border-box;
}

html {
  height: 100%;
  background: url('background_image.jpg') center / cover no-repeat;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: var(--text-primary);

  display: flex;
  align-items: center;
  justify-content: center;

  min-height: 100vh;
  height: 100%;
  padding: 20px;
}

/* Fine control for different screen sizes */
@media (max-width: 768px) {
  body {
    background-position: center 25%;
  }
}

@media (max-width: 480px) {
  body {
    background-position: center 20%;
  }
}

@media (min-width: 1200px) {
  body {
    background-position: center 35%;
  }
}

@supports (-webkit-touch-callout: none) {
  html, body {
    height: -webkit-fill-available;
  }
}

.card {
  background: var(--card-bg);
  padding: 32px;
  border-radius: 18px;
  width: 100%;
  max-width: 420px;

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin-bottom: 4px;
  font-size: clamp(26px, 4vw, 32px);
  letter-spacing: 0.3px;
}

.pronouns {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 16px;
}

.subtitle {
  margin-bottom: 22px;
  color: var(--text-secondary);
  font-size: clamp(14px, 2.5vw, 16px);
  line-height: 1.5;
}

.button {
  display: flex;
  align-items: center;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  gap: 10px;
  justify-content: flex-start;
  padding-left: 16px;

  background: var(--button-bg);
  color: var(--text-primary);
  text-decoration: none;

  border-radius: 10px;
  font-weight: 500;
  font-size: 15px;

  border: 1px solid var(--border);

  transition: all 0.2s ease;
}

.button:hover {
  background: var(--button-hover);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

.button img {
  width: 18px;
  height: 18px;
  object-fit: contain;
  opacity: 0.85;
}

.row {
  display: flex;
  gap: 10px;
}

.row .button {
  flex: 1;
}

@media (max-width: 480px) {

  .card {
    padding: 26px;
  }

  .button {
    padding: 16px;
    font-size: 16px;
  }

}

</style>
</head>

<body>

<div class="card">

<h1>Kartik Saravanan</h1>

<div class="pronouns">
he / him
</div>

<div class="subtitle">
Strategic Operations Fellow<br>
AIC RAISE
</div>

<a class="button" href="Kartik Saravanan - AIC RAISE.vcf">Save Contact ↓</a>

<div class="row">
  <a class="button" href="tel:+14252707089">Call (US)</a>
  <a class="button" href="tel:+917418864002">Call (IN)</a>
</div>

<a class="button" href="mailto:Ecosystem@aicraise.com">AIC RAISE Email</a>
<a class="button" href="mailto:Kartsarav@gmail.com">Work Email</a>

<a class="button" href="https://LinkedIn.com/in/kartsarav">
  <img src="InBug-White.png" alt="LinkedIn">
  LinkedIn ↗
</a>

<a class="button" href="https://www.instagram.com/kartsarav/">
  <img src="Instagram_Glyph_White.png" alt="Instagram">
  Instagram ↗
</a>

</div>

</body>
</html>
