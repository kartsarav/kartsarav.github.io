<!DOCTYPE html>
<html>
<head>
<title>Kartik Saravanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
  --bg: #405d63;
  --card-bg: rgba(255, 255, 255, 0.25);
  --text-primary: #1f2a2e;
  --text-secondary: #5e848e;
  --button-bg: rgba(255, 255, 255, 0.35);
  --button-hover: rgba(255, 255, 255, 0.55);
  --border: rgba(255, 255, 255, 0.35);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #4D7D89, #31535C);
  color: var(--text-primary);

  display: flex;
  align-items: center;
  justify-content: center;

  min-height: 100vh;
  padding: 20px;
}

.card {
  background: var(--card-bg);
  padding: 32px;
  border-radius: 18px;
  width: 100%;
  max-width: 420px;

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  overflow: hidden;
}

h1 {
  margin-bottom: 4px;
  font-size: clamp(26px, 4vw, 32px);
  letter-spacing: 0.3px;
}

.pronouns {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 16px;
}

.subtitle {
  margin-bottom: 22px;
  color: var(--text-secondary);
  font-size: clamp(14px, 2.5vw, 16px);
  line-height: 1.5;
}

.button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  width: 100%;
  margin: 10px 0;
  padding: 14px;

  background: var(--button-bg);
  color: var(--text-primary);
  text-decoration: none;

  border-radius: 10px;
  font-weight: 500;
  font-size: 15px;

  border: 1px solid var(--border);

  transition: all 0.2s ease;
}

.button:hover {
  background: var(--button-hover);
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

.row {
  display: flex;
  gap: 10px;
}

.row .button {
  flex: 1;
}

@media (max-width: 480px) {

  .card {
    padding: 26px;
  }

  .button {
    padding: 16px;
    font-size: 16px;
  }

}

</style>
</head>

<body>

<div class="card">

<h1>Kartik Saravanan</h1>

<div class="pronouns">
he / him
</div>

<div class="subtitle">
Strategic Operations Fellow<br>
AIC RAISE
</div>

</body>
</html>
